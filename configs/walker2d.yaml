env:
  name: walker2d
  env_id: Walker2d-v5
  max_episode_steps: 1000
  deterministic_eval: true
expert:
  kind: offline_rl
  batch_size: 256
  learning_rate: 3.0e-4
  weight_decay: 1.0e-3
  hidden_dims: [256, 256]
  dropout: 0.0
  epochs: 200
  grad_clip_norm: 10.0
  checkpoint_interval: 10
  ref_q_epochs: 300
  ref_q_hidden_dims: [256, 256]
rlpd:
  batch_size: 256
  learning_rate: 3.0e-4
  discount: 0.99
  weight_decay: 1.0e-3
  actor_hidden_dims: [256, 256]
  critic_hidden_dims: [256, 256]
  critic_ensemble_size: 10
  critic_subset_size: 2  # Walker2d keeps the same ensemble but uses the lighter update regime.
  tau: 0.005
  utd_ratio: 1
  offline_ratio: 0.5
  entropy_backup: false
  automatic_entropy_tuning: false
  target_entropy_scale: -1.0
  grad_clip_norm: 1.0
rlif:
  intervention_mode: value
  relative_threshold: false
  beta: 0.95
  alpha: 0.997
  delta: 2
  zero_offline_rewards: true
  takeover_steps: 4
  rounds: 200
  trajectories_per_round: 5
  pretrain_epochs: 200
  pretrain_train_steps_per_epoch: 300
  round_train_epochs: 25
  round_train_steps_per_epoch: 100
  eval_interval_rounds: 1
  checkpoint_interval_rounds: 1
  eval_episodes: 10
  seed: 3
  warmup_steps: 0
  debug_interval_updates: 10000
  debug_preview_size: 8
  online_buffer_size: 1000000
  offline_buffer_size: 1000000
  resume_from: ""
data:
  offline_path: data/walker2d_expert.npz
  expert_demo_path: data/walker2d_expert.npz
  output_dir: outputs
  offline_trajectory_limit: 10  # Walker2d warm-start uses 10 expert trajectories.
